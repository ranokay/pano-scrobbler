name: Pano Scrobbler macOS

on:
  workflow_dispatch:
  push:
    paths:
      - "apple/**"
      - "version.txt"
      - "changelog.md"
      - ".github/workflows/apple-macos.yml"
  pull_request:
    paths:
      - "apple/**"
      - "version.txt"
      - "changelog.md"
      - ".github/workflows/apple-macos.yml"

permissions:
  contents: read

jobs:
  macos:
    name: Test and build macOS
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show toolchain
        working-directory: apple
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        working-directory: apple
        run: swift build

      - name: Test
        working-directory: apple
        run: swift test

      - name: Build DMG
        run: bash apple/scripts/build_dmg.sh

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: pano-scrobbler-macos-arm64
          path: dist/pano-scrobbler-macos-arm64.dmg

  publish-release:
    name: Publish macOS release
    needs: [macos]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download macOS DMG artifact
        uses: actions/download-artifact@v8
        with:
          name: pano-scrobbler-macos-arm64
          path: dist

      - name: Read release metadata
        id: release_metadata
        shell: bash
        run: |
          verCode="$(tr -cd '0-9' < version.txt)"
          verName="$((10#$verCode / 100)).$((10#$verCode % 100))"
          echo "verCode=$verCode" >> "$GITHUB_OUTPUT"
          echo "verName=$verName" >> "$GITHUB_OUTPUT"
          {
            echo "changelog<<EOF"
            cat changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create macOS GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-${{ steps.release_metadata.outputs.verCode }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_metadata.outputs.verName }} macOS
          body: ${{ steps.release_metadata.outputs.changelog }}
          files: dist/pano-scrobbler-macos-*.dmg
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true

name: Pano Scrobbler macOS

on:
  push:
    paths:
      - "apple/**"
      - ".github/workflows/apple-macos.yml"
  pull_request:
    paths:
      - "apple/**"
      - ".github/workflows/apple-macos.yml"

jobs:
  swiftpm:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Show toolchain
        working-directory: apple
        run: |
          swift --version
          xcodebuild -version
      - name: Build
        working-directory: apple
        run: swift build
      - name: Test
        working-directory: apple
        run: swift test
